name: Release

on:
  # push:
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Manual release type'
        required: true
        default: notarized
        type: choice
        options:
          - unsigned
          - notarized
      version:
        description: 'Version tag override; must match VERSION (for example v0.1.1)'
        required: false
        default: ''

env:
  APP_NAME: GrokBuild

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          app_version="$(tr -d '[:space:]' < VERSION)"
          default_tag="v${app_version}"
          input_version="${{ github.event.inputs.version || '' }}"

          if [ -n "$input_version" ]; then
            case "$input_version" in
              v*) tag_name="$input_version" ;;
              *) tag_name="v${input_version}" ;;
            esac
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="$default_tag"
          else
            tag_name="${{ github.ref_name }}"
          fi

          if [ "$tag_name" != "$default_tag" ]; then
            echo "::error::Release tag '$tag_name' does not match VERSION '$default_tag'. Update VERSION or use the matching tag."
            exit 1
          fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Determine if notarized
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.release_type }}" = "notarized" ]; then
            echo "notarized=true" >> $GITHUB_OUTPUT
          else
            echo "notarized=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install agent-desktop for bundling
        run: npm install -g agent-desktop

      # Only import cert and set identity for notarized builds
      - name: Import Apple Certificate (notarized only)
        if: steps.config.outputs.notarized == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build unsigned .app + DMG
        if: steps.config.outputs.notarized != 'true'
        run: |
          make app
          make dmg-package
          test -x "dist/${{ env.APP_NAME }}.app/Contents/MacOS/agent-desktop"

      - name: Build signed + notarized
        if: steps.config.outputs.notarized == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY || 'Developer ID Application' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER_ID" ] || [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "::error::APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, and APPLE_API_KEY_BASE64 secrets are required for notarized releases."
            exit 1
          fi
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          export APPLE_API_KEY_PATH
          make signed SIGN_IDENTITY="$SIGN_IDENTITY"
          test -x "dist/${{ env.APP_NAME }}.app/Contents/MacOS/agent-desktop"
          ./scripts/notarize.sh dist/${{ env.APP_NAME }}.app
          rm -f "$APPLE_API_KEY_PATH"
          make dmg-package

      - name: Read build number for release
        id: version
        shell: bash
        run: |
          build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          tracked_version="$(tr -d '[:space:]' < BUILD_NUMBER_VERSION)"
          app_version="${{ steps.validate.outputs.app_version }}"

          if [ "$tracked_version" != "$app_version" ]; then
            echo "::error::BUILD_NUMBER_VERSION ($tracked_version) does not match VERSION ($app_version) after build."
            exit 1
          fi

          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.config.outputs.notarized }}" = "true" ]; then
            echo "release_name=${{ steps.validate.outputs.tag_name }} (${build_number}) (Notarized)" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=${{ steps.validate.outputs.tag_name }} (${build_number}) (Unsigned)" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare versioned release assets
        run: |
          TAG="${{ steps.validate.outputs.tag_name }}"
          ditto -c -k --keepParent "dist/${{ env.APP_NAME }}.app" "dist/${{ env.APP_NAME }}-${TAG}.app.zip"
          cp "dist/${{ env.APP_NAME }}-macOS.dmg" "dist/${{ env.APP_NAME }}-${TAG}-macOS.dmg"

      - name: Prepare release notes
        id: notes
        env:
          RELEASE_TAG: ${{ steps.validate.outputs.tag_name }}
        run: |
          ZIP_NAME="${{ env.APP_NAME }}-${RELEASE_TAG}.app.zip"
          DMG_NAME="${{ env.APP_NAME }}-${RELEASE_TAG}-macOS.dmg"
          if [ "${{ steps.config.outputs.notarized }}" = "true" ]; then
            cat > release-body.txt <<EOF
          ## Downloads

          - \`${ZIP_NAME}\` — Signed + notarized build (recommended)
          - \`${DMG_NAME}\` — Signed + notarized DMG

          This version is properly code-signed and notarized. No Gatekeeper warnings.
          EOF
          else
            cat > release-body.txt <<EOF
          ## Downloads

          - \`${ZIP_NAME}\` — Unsigned build
          - \`${DMG_NAME}\` — Unsigned DMG

          ## How to bypass Gatekeeper protection (unsigned builds)

          macOS may block unsigned apps.

          **Quick ways to open:**

          1. Right-click \`GrokBuild.app\` (or the DMG) → **Open**
          2. Terminal: \`xattr -cr ~/Applications/GrokBuild.app\`
          3. System Settings → Privacy & Security → "Open Anyway"

          ---

          For a signed + notarized version with no warnings, run this workflow manually.
          EOF
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat release-body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (published)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.validate.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: ${{ steps.notes.outputs.body }}
          overwrite_files: true
          files: |
            dist/${{ env.APP_NAME }}-${{ steps.validate.outputs.tag_name }}.app.zip
            dist/${{ env.APP_NAME }}-${{ steps.validate.outputs.tag_name }}-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}