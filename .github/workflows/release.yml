name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Manual release type'
        required: true
        default: unsigned
        type: choice
        options:
          - unsigned
          - notarized
      version:
        description: 'Version tag override; must match VERSION (for example v0.1.1)'
        required: false
        default: ''

env:
  APP_NAME: GrokBuild

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          app_version="$(tr -d '[:space:]' < VERSION)"
          build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          default_tag="v${app_version}"
          input_version="${{ github.event.inputs.version || '' }}"

          if [ -n "$input_version" ]; then
            case "$input_version" in
              v*) tag_name="$input_version" ;;
              *) tag_name="v${input_version}" ;;
            esac
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="$default_tag"
          else
            tag_name="${{ github.ref_name }}"
          fi

          if [ "$tag_name" != "$default_tag" ]; then
            echo "::error::Release tag '$tag_name' does not match VERSION '$default_tag'. Update VERSION or use the matching tag."
            exit 1
          fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Determine if notarized
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.release_type }}" = "notarized" ]; then
            echo "notarized=true" >> $GITHUB_OUTPUT
            echo "release_name=${{ steps.version.outputs.tag_name }} (${{ steps.version.outputs.build_number }}) (Notarized)" >> $GITHUB_OUTPUT
          else
            echo "notarized=false" >> $GITHUB_OUTPUT
            echo "release_name=${{ steps.version.outputs.tag_name }} (${{ steps.version.outputs.build_number }}) (Unsigned)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install agent-desktop for bundling
        run: npm install -g agent-desktop

      # Only import cert and set identity for notarized builds
      - name: Import Apple Certificate (notarized only)
        if: steps.config.outputs.notarized == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build unsigned .app + DMG
        if: steps.config.outputs.notarized != 'true'
        run: |
          make app
          make dmg
          test -x "dist/${{ env.APP_NAME }}.app/Contents/MacOS/agent-desktop"

      - name: Build signed + notarized
        if: steps.config.outputs.notarized == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY || 'Developer ID Application' }}
        run: |
          make signed SIGN_IDENTITY="$SIGN_IDENTITY"
          test -x "dist/${{ env.APP_NAME }}.app/Contents/MacOS/agent-desktop"
          ./scripts/notarize.sh dist/${{ env.APP_NAME }}.app
          make dmg

      - name: Zip the .app
        run: |
          ditto -c -k --keepParent dist/${{ env.APP_NAME }}.app dist/${{ env.APP_NAME }}.app.zip

      - name: Prepare release notes
        id: notes
        run: |
          if [ "${{ steps.config.outputs.notarized }}" = "true" ]; then
            cat > release-body.txt << 'EOF'
          ## Downloads

          - `GrokBuild.app.zip` — Signed + notarized build (recommended)
          - `GrokBuild-macOS.dmg` — Signed + notarized DMG

          This version is properly code-signed and notarized. No Gatekeeper warnings.
          EOF
          else
            cat > release-body.txt << 'EOF'
          ## Downloads

          - `GrokBuild.app.zip` — Unsigned build
          - `GrokBuild-macOS.dmg` — Unsigned DMG

          ## How to bypass Gatekeeper protection (unsigned builds)

          macOS may block unsigned apps.

          **Quick ways to open:**

          1. Right-click `GrokBuild.app` (or the DMG) → **Open**
          2. Terminal: `xattr -cr ~/Applications/GrokBuild.app`
          3. System Settings → Privacy & Security → "Open Anyway"

          ---

          For a signed + notarized version with no warnings, run this workflow manually.
          EOF
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat release-body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (published)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.config.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: ${{ steps.notes.outputs.body }}
          overwrite_files: true
          files: |
            dist/${{ env.APP_NAME }}.app.zip
            dist/${{ env.APP_NAME }}-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}