name: PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: make test

      - name: Build unsigned app bundle
        run: make app

      - name: Verify app bundle exists
        run: test -d "dist/GrokBuild.app"
